<!DOCTYPE html>
<html lang="ro">
  <head>
    <meta charset="utf-8" />
    <title>NOKU LABS</title>
    <!--
      Root redirect: sends visitors from / to /ro (the default locale).
      This file is copied as-is into out/index.html during `next build`.
      CDN-level redirects (Cloudflare, Netlify, Vercel) are preferred when
      available — this HTML fallback ensures the redirect works on any
      static file host without configuration.
    -->
    <meta http-equiv="refresh" content="0;url=/ro" />
    <link rel="canonical" href="https://nokulabs.com/ro" />
    <script>window.location.replace('/ro')</script>
  </head>
  <body></body>
</html>
